<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PetLog 마이</title>

    <meta
      name="description"
      content="PetLog 반려동물과 보호자 정보를 관리하는 마이 화면입니다."
    />

    <link rel="stylesheet" href="./css/style16.css" />
  </head>

  <body>
    <a href="#mainContent" class="skip-link">본문 바로가기</a>

    <main id="mainContent" class="app" aria-label="PetLog 마이 화면">
      <!-- Header -->
      <header class="page-header">
        <div>
          <h1 class="page-title">마이</h1>
          <p class="page-desc">보리와 보호자 정보를 관리해보세요</p>
        </div>

        <button
          type="button"
          class="setting-button"
          id="goSettingButton"
          aria-label="설정 화면으로 이동"
        >
          <span aria-hidden="true">⚙</span>
        </button>
      </header>

      <!-- Section 1: 반려동물 프로필 -->
      <section
        class="my-section profile-section"
        aria-labelledby="profileTitle"
      >
        <article class="profile-card">
          <div class="profile-image">
            <img src="./images/05/img.png" alt="보리 프로필 사진" />
          </div>

          <div class="profile-info">
            <h2 id="profileTitle" class="profile-name">
              <span id="petNameText">보리</span>
              <small>♀</small>
            </h2>

            <p class="profile-meta">
              <span id="petAgeText">10살</span> ·
              <span id="petBreedText">페키니즈</span>
            </p>

            <p class="profile-weight">
              중량 : <span id="petWeightText">5.1kg</span>
            </p>
          </div>

          <button
            type="button"
            class="profile-edit-button"
            id="openPetEditButton"
          >
            수정
          </button>
        </article>
      </section>

      <!-- Section 2: 보호자 정보 -->
      <section
        class="my-section guardian-section"
        aria-labelledby="guardianTitle"
      >
        <article class="guardian-card">
          <div class="section-head">
            <div>
              <h2 id="guardianTitle" class="section-title">보호자 정보</h2>
              <p class="section-desc">연락처와 주 이용 지역을 관리해요</p>
            </div>

            <button
              type="button"
              class="small-edit-button"
              id="openGuardianEditButton"
            >
              편집
            </button>
          </div>

          <dl class="info-list">
            <div class="info-row">
              <dt>보호자</dt>
              <dd id="guardianNameText">홍준</dd>
            </div>

            <div class="info-row">
              <dt>연락처</dt>
              <dd id="guardianPhoneText">010-0000-0000</dd>
            </div>

            <div class="info-row">
              <dt>주 이용 지역</dt>
              <dd id="guardianAreaText">김포 장기동</dd>
            </div>
          </dl>
        </article>
      </section>

      <!-- Section 3: 반려동물 관리 -->
      <section class="my-section menu-section" aria-labelledby="careMenuTitle">
        <h2 id="careMenuTitle" class="section-title">반려동물 관리</h2>

        <div class="menu-list">
          <button type="button" class="menu-item" id="openPetEditMenuButton">
            <span class="menu-icon">🐶</span>
            <span class="menu-text">
              <strong>보리 정보 수정</strong>
              <small>이름, 나이, 견종, 몸무게 변경</small>
            </span>
            <span class="menu-arrow">›</span>
          </button>

          <a href="./index11.html" class="menu-item">
            <span class="menu-icon">🏥</span>
            <span class="menu-text">
              <strong>병원 즐겨찾기</strong>
              <small>자주 가는 병원을 확인해요</small>
            </span>
            <span class="menu-arrow">›</span>
          </a>

          <a href="./index9.html" class="menu-item">
            <span class="menu-icon">📅</span>
            <span class="menu-text">
              <strong>일정 관리</strong>
              <small>병원, 산책, 약 일정을 관리해요</small>
            </span>
            <span class="menu-arrow">›</span>
          </a>
        </div>
      </section>

      <!-- Section 4: 알림 설정 -->
      <section class="my-section alarm-section" aria-labelledby="alarmTitle">
        <h2 id="alarmTitle" class="section-title">알림 설정</h2>

        <div class="toggle-list">
          <label class="toggle-row">
            <span>
              <strong>산책 알림</strong>
              <small>매일 산책 시간을 알려줘요</small>
            </span>

            <input type="checkbox" id="walkAlarmToggle" />
            <em aria-hidden="true"></em>
          </label>

          <label class="toggle-row">
            <span>
              <strong>약 알림</strong>
              <small>약 먹는 시간을 놓치지 않게 해요</small>
            </span>

            <input type="checkbox" id="medicineAlarmToggle" />
            <em aria-hidden="true"></em>
          </label>

          <label class="toggle-row">
            <span>
              <strong>병원 알림</strong>
              <small>검진 일정을 미리 알려줘요</small>
            </span>

            <input type="checkbox" id="hospitalAlarmToggle" />
            <em aria-hidden="true"></em>
          </label>
        </div>
      </section>

      <!-- Section 5: 데이터 관리 -->
      <section class="my-section data-section" aria-labelledby="dataTitle">
        <h2 id="dataTitle" class="section-title">데이터 관리</h2>

        <div class="data-card">
          <button type="button" class="data-button" id="clearMemoButton">
            메모 데이터 초기화
          </button>

          <button type="button" class="data-button" id="clearPhotoButton">
            사진 추가 데이터 초기화
          </button>

          <button
            type="button"
            class="data-button is-danger"
            id="clearRecordButton"
          >
            산책 기록 초기화
          </button>
        </div>
      </section>

      <!-- Pet Edit Bottom Sheet -->
      <div class="sheet-dim" id="petEditDim" aria-hidden="true"></div>

      <section class="edit-sheet" id="petEditSheet" aria-label="보리 정보 수정">
        <div class="sheet-handle" aria-hidden="true"></div>

        <div class="sheet-head">
          <h2>보리 정보 수정</h2>
          <button type="button" id="petEditCloseButton">닫기</button>
        </div>

        <div class="edit-form">
          <label class="edit-field">
            <span>이름</span>
            <input type="text" id="petNameInput" maxlength="10" />
          </label>

          <label class="edit-field">
            <span>나이</span>
            <input type="text" id="petAgeInput" maxlength="10" />
          </label>

          <label class="edit-field">
            <span>견종</span>
            <input type="text" id="petBreedInput" maxlength="20" />
          </label>

          <label class="edit-field">
            <span>몸무게</span>
            <input type="text" id="petWeightInput" maxlength="10" />
          </label>
        </div>

        <div class="sheet-actions">
          <button type="button" class="cancel-button" id="petEditCancelButton">
            취소
          </button>

          <button type="button" class="save-button" id="petEditSaveButton">
            저장
          </button>
        </div>
      </section>

      <!-- Guardian Edit Bottom Sheet -->
      <div class="sheet-dim" id="guardianEditDim" aria-hidden="true"></div>

      <section
        class="edit-sheet"
        id="guardianEditSheet"
        aria-label="보호자 정보 수정"
      >
        <div class="sheet-handle" aria-hidden="true"></div>

        <div class="sheet-head">
          <h2>보호자 정보 수정</h2>
          <button type="button" id="guardianEditCloseButton">닫기</button>
        </div>

        <div class="edit-form">
          <label class="edit-field">
            <span>보호자 이름</span>
            <input type="text" id="guardianNameInput" maxlength="12" />
          </label>

          <label class="edit-field">
            <span>연락처</span>
            <input type="tel" id="guardianPhoneInput" maxlength="20" />
          </label>

          <label class="edit-field">
            <span>주 이용 지역</span>
            <input type="text" id="guardianAreaInput" maxlength="24" />
          </label>
        </div>

        <div class="sheet-actions">
          <button
            type="button"
            class="cancel-button"
            id="guardianEditCancelButton"
          >
            취소
          </button>

          <button type="button" class="save-button" id="guardianEditSaveButton">
            저장
          </button>
        </div>
      </section>

      <!-- Toast -->
      <p class="toast" id="toastMessage" role="status" aria-live="polite"></p>

      <!-- Footer -->
      <footer class="bottom-nav" aria-label="하단 탭 메뉴">
        <nav class="tab-menu">
          <a href="./index5.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/home_off.png" alt="" class="icon-off" />
              <img src="./images/05/home_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">홈</span>
          </a>

          <a href="./index6.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/Photo_off.png" alt="" class="icon-off" />
              <img src="./images/05/Photo_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">사진</span>
          </a>

          <a href="./index7.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/check_off.png" alt="" class="icon-off" />
              <img src="./images/05/check_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">기록</span>
          </a>

          <a href="./index11.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/Hospital_off.png" alt="" class="icon-off" />
              <img src="./images/05/Hospital_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">병원</span>
          </a>

          <a
            href="./index16.html"
            class="tab-item is-active"
            aria-current="page"
          >
            <span class="tab-icon">
              <img src="./images/05/my_off.png" alt="" class="icon-off" />
              <img src="./images/05/my_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">마이</span>
          </a>
        </nav>
      </footer>
    </main>

    <script src="./script/script16.js"></script>
  </body>
</html>
