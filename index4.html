<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PetLog 반려동물 등록</title>

    <meta name="description" content="PetLog 반려동물 등록 안내 화면입니다." />

    <link rel="stylesheet" href="./css/style4.css" />
  </head>

  <body>
    <a href="#mainContent" class="skip-link">본문 바로가기</a>

    <main id="mainContent" class="app" aria-label="반려동물 등록 안내 화면">
      <!-- Section 1: 로고 영역 -->
      <section class="empty-section logo-section" aria-label="PetLog 로고">
        <h1 class="blind">PetLog 반려동물 등록</h1>

        <!-- 로고 이미지 수정 위치 -->
        <img src="./images/04/logo.png" alt="PetLog 로고" class="empty-logo" />
      </section>

      <!-- Section 2: 안내 문구 영역 -->
      <section
        class="empty-section message-section"
        aria-label="등록 안내 문구"
      >
        <h2 class="empty-title">등록된 반려동물이 없습니다</h2>

        <p class="empty-desc">반려 동물을 등록하고 건강 관리를 시작해보세요</p>
      </section>

      <!-- Section 3: 버튼 영역 -->
      <section
        class="empty-section action-section"
        aria-label="반려동물 등록 버튼"
      >
        <a href="./index5.html" class="register-button"> 반려동물 등록하기 </a>
      </section>
    </main>

    <script src="./script/script4.js"></script>
  </body>
</html>
