<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>PetLog 병원 지도</title>

    <meta
      name="description"
      content="PetLog 현재 위치 기반 동물병원 지도 화면입니다."
    />

    <link rel="stylesheet" href="./css/style13.css" />

    <!-- 카카오 지도 SDK: 반드시 script13.js보다 먼저 로드 -->
    <!-- appkey 값은 네 카카오 JavaScript 키로 유지 -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=db9e577f9be8ad1e9a73a4f3d1b1bf7e&libraries=services&autoload=false"></script>
  </head>

  <body>
    <a href="#mainContent" class="skip-link">본문 바로가기</a>

    <main id="mainContent" class="app" aria-label="PetLog 병원 지도 화면">
      <!-- Header: 뒤로가기 / 제목 / 현재 위치 -->
      <header class="page-header">
        <div class="header-left">
          <a
            href="./index11.html"
            class="back-button"
            aria-label="병원 리스트 화면으로 돌아가기"
          >
            <img src="./images/06/icon.png" alt="" aria-hidden="true" />
          </a>

          <h1 class="page-title">병원 지도</h1>
        </div>

        <button
          type="button"
          class="location-button"
          id="locationButton"
          aria-label="현재 위치로 이동"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M12 21C12 21 18 14.9 18 9.8C18 6.5 15.3 4 12 4C8.7 4 6 6.5 6 9.8C6 14.9 12 21 12 21Z"
              stroke="#FEBC34"
              stroke-width="2"
              stroke-linejoin="round"
            />
            <circle cx="12" cy="10" r="2.4" fill="#FEBC34" />
          </svg>
        </button>
      </header>

      <!-- Section 1: 검색 / 상태 안내 -->
      <section
        class="map-section status-section"
        aria-label="지도 검색 및 상태 안내"
      >
        <p class="page-desc">지역을 검색해서 주변 동물병원을 확인해보세요</p>

        <form class="map-search-form" id="mapSearchForm" role="search">
          <label for="mapSearchInput" class="blind">지역 또는 병원 검색</label>

          <div class="map-search-box">
            <svg
              class="map-search-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="10.8"
                cy="10.8"
                r="6.3"
                stroke="#FEBC34"
                stroke-width="2"
              />
              <path
                d="M15.5 15.5L20 20"
                stroke="#FEBC34"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>

            <input
              type="search"
              id="mapSearchInput"
              placeholder="예: 서울, 강남, 김포 장기동"
              autocomplete="off"
            />

            <button type="submit" class="map-search-button">검색</button>
          </div>
        </form>

        <div class="status-card" id="statusCard">
          <span class="status-dot" aria-hidden="true"></span>
          <p id="statusText">카카오 지도를 준비하고 있어요</p>
        </div>
      </section>

      <!-- Section 2: 지도 -->
      <section class="map-section kakao-map-section" aria-label="동물병원 지도">
        <div
          id="map"
          class="map-view"
          role="img"
          aria-label="동물병원 위치 지도"
        ></div>

        <button type="button" class="refresh-button" id="refreshButton">
          주변 병원 다시 찾기
        </button>
      </section>

      <!-- Section 3: 병원 리스트 -->
      <section
        class="map-section nearby-section"
        aria-label="주변 동물병원 목록"
      >
        <div class="section-head">
          <h2 class="section-title">주변 병원</h2>
          <span class="hospital-count" id="hospitalCount">0곳</span>
        </div>

        <ul class="nearby-list" id="nearbyList"></ul>
      </section>

      <!-- Footer: 하단 고정 탭바 -->
      <footer class="bottom-nav" aria-label="하단 탭 메뉴">
        <nav class="tab-menu">
          <a href="./index5.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/home_off.png" alt="" class="icon-off" />
              <img src="./images/05/home_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">홈</span>
          </a>

          <a href="./index6.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/Photo_off.png" alt="" class="icon-off" />
              <img src="./images/05/Photo_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">사진</span>
          </a>

          <a href="./index7.html" class="tab-item">
            <span class="tab-icon">
              <img src="./images/05/check_off.png" alt="" class="icon-off" />
              <img src="./images/05/check_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">기록</span>
          </a>

          <a
            href="./index11.html"
            class="tab-item is-active"
            aria-current="page"
          >
            <span class="tab-icon">
              <img src="./images/05/Hospital_off.png" alt="" class="icon-off" />
              <img src="./images/05/Hospital_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">병원</span>
          </a>

          <a href="./index16.html" class="tab-item" aria-label="마이 화면으로 이동">
            <span class="tab-icon">
              <img src="./images/05/my_off.png" alt="" class="icon-off" />
              <img src="./images/05/my_on.png" alt="" class="icon-on" />
            </span>
            <span class="tab-label">마이</span>
          </a>
        </nav>
      </footer>
    </main>

    <script src="./script/script13.js"></script>
  </body>
</html>
